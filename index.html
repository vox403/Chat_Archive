<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAND 1:1 채팅 백업 템플릿</title>
  <style>
    :root {
      --bg: #eef2f7;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #0f172a;
      --muted: #475569;
      --line: #d8e0ec;
      --line-strong: #c7d2e0;
      --header: #5677e4;
      --header-deep: #4d6bd3;
      --other-bubble: #ffffff;
      --me-bubble: #dff7ce;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      --shadow-soft: 0 12px 28px rgba(15, 23, 42, 0.08);

      --editor-width: 440px;
      --app-width: 392px;

      --desktop-chat-height: clamp(620px, calc(100dvh - 104px), 720px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #edf2f9 0%, #e7edf6 100%);
    }

    body {
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 20px;
      overflow-x: clip;
    }

    .page {
      width: min(1220px, 100%);
      display: grid;
      grid-template-columns: minmax(360px, var(--editor-width)) minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }

    .page.editor-collapsed {
      grid-template-columns: 1fr;
      max-width: calc(var(--app-width) + 120px);
    }

    .editor {
      position: sticky;
      top: 20px;
      max-height: calc(100dvh - 40px);
      overflow: auto;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow-soft);
    }

    .editor.hidden {
      display: none;
    }

    .editor-head {
      padding: 24px 22px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(86, 119, 228, 0.08), rgba(86, 119, 228, 0.02));
    }

    .editor-head h1 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.35;
    }

    .editor-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .editor-body {
      padding: 20px;
      display: grid;
      gap: 18px;
    }


    .editor-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 14px;
      font-weight: 800;
      color: #1e293b;
      line-height: 1.45;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--line-strong);
      background: #ffffff;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      font-size: 15px;
      color: inherit;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: #94a3b8;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: rgba(86, 119, 228, 0.72);
      box-shadow: 0 0 0 4px rgba(86, 119, 228, 0.12);
    }

    .field textarea {
      min-height: 320px;
      resize: vertical;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions .file-label {
      grid-column: 1 / -1;
    }

    button,
    .file-label {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      background: #111827;
      color: #ffffff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .actions button,
    .actions .file-label {
      width: 100%;
    }

    button:hover,
    .file-label:hover {
      transform: translateY(-1px);
    }

    button.secondary,
    .file-label.secondary {
      background: #ffffff;
      color: #111827;
      border: 1px solid var(--line);
    }

    button.ghost {
      background: #f8fafc;
      color: #334155;
      border: 1px solid var(--line);
    }

    button.danger {
      background: #ffffff;
      color: #b91c1c;
      border: 1px solid rgba(239, 68, 68, 0.24);
    }

    input[type="file"] {
      display: none;
    }

    .muted-note {
      font-size: 13px;
      line-height: 1.7;
      color: var(--muted);
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
    }

    .status {
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid var(--line);
      padding: 13px 14px;
      font-size: 13px;
      line-height: 1.65;
      color: var(--muted);
    }

    .status.error {
      border-color: rgba(239, 68, 68, 0.35);
      background: rgba(254, 242, 242, 0.92);
      color: #991b1b;
    }

    .status.success {
      border-color: rgba(34, 197, 94, 0.3);
      background: rgba(240, 253, 244, 0.92);
      color: #166534;
    }

    .preview-wrap {
      min-width: 0;
      width: 100%;
      display: grid;
      gap: 14px;
      justify-items: center;
      align-content: start;
      padding-inline: 24px;
    }

    .preview-toolbar {
      width: 100%;
      max-width: calc(var(--app-width) + 32px);
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .chat-app {
      width: 100%;
      max-width: var(--app-width);
      height: var(--desktop-chat-height);
      min-height: 600px;
      max-height: calc(100dvh - 96px);
      background: #f2f4f8;
      border-radius: 22px;
      border: 1px solid rgba(15, 23, 42, 0.06);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-inline: auto;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
    }

    .chat-header {
      background: linear-gradient(180deg, var(--header) 0%, var(--header-deep) 100%);
      color: #ffffff;
      padding: 16px 24px 13px 18px;
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) 30px;
      align-items: center;
      gap: 12px;
    }

    .header-icon,
    .mock-icon {
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      user-select: none;
      flex: 0 0 auto;
    }

    .header-icon {
      background: rgba(255, 255, 255, 0.14);
      font-size: 15px;
    }

    .header-center {
      text-align: center;
      min-width: 0;
    }

    .header-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-subtitle {
      margin-top: 3px;
      font-size: 12px;
      opacity: 0.92;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .participant-bar {
      background: #ffffff;
      padding: 12px 24px 12px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .person-chip {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .person-chip.me {
      justify-content: flex-end;
      text-align: right;
      padding-right: 8px;
    }

    .person-chip.other {
      padding-left: 2px;
    }

    .person-meta {
      min-width: 0;
    }

    .person-role {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .person-name {
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .avatar,
    .mini-avatar {
      flex: 0 0 auto;
      border-radius: 999px;
      background: linear-gradient(135deg, #dbe6ff, #bfd1ff);
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #2f4db6;
      font-weight: 800;
    }

    .avatar {
      width: 38px;
      height: 38px;
      font-size: 16px;
    }

    .mini-avatar {
      width: 32px;
      height: 32px;
      font-size: 12px;
    }

    .avatar img,
    .mini-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .messages {
      padding: 16px 14px 20px;
      overflow: auto;
      min-height: 0;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.66), rgba(255, 255, 255, 0) 36%),
        linear-gradient(180deg, #f4f6f9 0%, #eff3f7 100%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .date-divider {
      align-self: center;
      margin: 8px 0 2px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.25);
      color: var(--muted);
      font-size: 12px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
    }

    .message-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      max-width: 100%;
    }

    .message-row.me {
      justify-content: flex-end;
    }

    .message-row.me .message-main {
      align-items: flex-end;
    }

    .avatar-slot {
      width: 32px;
      flex: 0 0 32px;
      display: flex;
      justify-content: center;
      padding-top: 2px;
    }

    .avatar-slot.placeholder {
      visibility: hidden;
    }

    .message-main {
      min-width: 0;
      max-width: calc(100% - 40px);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sender-name {
      font-size: 12px;
      color: #475569;
      padding-left: 4px;
      font-weight: 700;
    }

    .bubble-line {
      display: flex;
      gap: 6px;
      align-items: flex-end;
      min-width: 0;
    }

    .message-row.me .bubble-line {
      justify-content: flex-end;
    }

    .bubble {
      max-width: min(80%, 288px);
      padding: 11px 13px;
      border-radius: 17px;
      background: var(--other-bubble);
      color: #111827;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
      border: 1px solid rgba(15, 23, 42, 0.03);
    }

    .message-row.me .bubble {
      background: var(--me-bubble);
    }

    .meta {
      font-size: 11px;
      color: #7c8797;
      padding: 0 2px 2px;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .empty-state {
      margin: auto;
      max-width: 280px;
      text-align: center;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 22px;
      padding: 22px 18px;
      color: var(--muted);
      line-height: 1.7;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.05);
    }

    .input-mock {
      background: #ffffff;
      border-top: 1px solid var(--line);
      padding: 11px 18px 11px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .input-hint {
      flex: 1;
      min-width: 0;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f8fafc;
      padding: 11px 14px;
      color: #94a3b8;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mock-icon {
      width: 30px;
      height: 30px;
      background: #f8fafc;
      border: 1px solid var(--line);
      color: #64748b;
      font-size: 12px;
    }

    .send-mock {
      min-width: 52px;
      flex: 0 0 52px;
      border-radius: 10px;
      background: #e5e7eb;
      color: #9ca3af;
      padding: 10px 0;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 1100px) {
      .page {
        grid-template-columns: minmax(340px, 400px) minmax(0, 1fr);
        gap: 18px;
      }

      .preview-wrap {
        padding-inline: 16px;
      }
    }

    @media (max-width: 980px) {
      body {
        padding: 0;
      }

      .page,
      .page.editor-collapsed {
        width: 100%;
        max-width: none;
        grid-template-columns: 1fr;
        gap: 0;
      }

      .editor {
        position: static;
        max-height: none;
        border-radius: 0;
        box-shadow: none;
        border-left: 0;
        border-right: 0;
      }

      .preview-wrap {
        width: 100%;
        gap: 0;
        padding-inline: 0;
      }

      .preview-toolbar {
        max-width: none;
        padding: 10px 12px;
        background: #ffffff;
        border-bottom: 1px solid var(--line);
      }

      .chat-app {
        width: 100%;
        max-width: none;
        height: calc(100dvh - 57px);
        min-height: 0;
        max-height: none;
        border-radius: 0;
        box-shadow: none;
        border: 0;
      }

      .chat-header {
        padding: 14px 16px 12px;
        grid-template-columns: 28px minmax(0, 1fr) 28px;
      }

      .participant-bar {
        padding: 10px 12px;
      }

      .person-chip.me {
        padding-right: 0;
      }

      .input-mock {
        padding: 10px 12px;
      }
    }

    @media (max-width: 560px) {
      .editor-head {
        padding: 20px 18px 14px;
      }

      .editor-body {
        padding: 16px;
      }

      .field input,
      .field select,
      .field textarea {
        font-size: 16px;
      }

      .bubble {
        max-width: 86%;
      }
    }
  </style>
</head>
<body>
  <div class="page" id="pageRoot">
    <aside class="editor" id="editorPanel">
      <div class="editor-head">
        <h1>BAND 1:1 채팅 백업 템플릿</h1>
        <p>
          txt 파일을 올리거나 붙여넣은 뒤 <strong>미리보기 갱신</strong>
          <br /> 편집 패널 숨기기로 언제든 숨길 수 있음
        </p>
      </div>

      <div class="editor-body">
        <div class="editor-grid">
          <div class="field">
            <label for="roomTitle">방 제목</label>
            <input id="roomTitle" type="text" placeholder="방 제목" />
          </div>

          <div class="field">
            <label for="roomSubtitle">부제 / 상태 문구</label>
            <input id="roomSubtitle" type="text" placeholder="부제 / 상태 문구" />
          </div>

          <div class="field">
            <label for="otherDisplayName">상대 표시 이름</label>
            <input id="otherDisplayName" type="text" placeholder="상대 표시 이름" />
          </div>

          <div class="field">
            <label for="myDisplayName">내 표시 이름</label>
            <input id="myDisplayName" type="text" placeholder="내 표시 이름" />
          </div>

          <div class="field">
            <label for="otherSourceName">txt 안에서 상대 이름</label>
            <select id="otherSourceName">
              <option value="">상대 이름 선택</option>
            </select>
          </div>

          <div class="field">
            <label for="mySourceName">txt 안에서 내 이름</label>
            <select id="mySourceName">
              <option value="">내 이름 선택</option>
            </select>
          </div>

          <div class="field full">
            <label for="otherAvatar">상대 프로필 이미지 URL 또는 파일 경로</label>
            <input id="otherAvatar" type="text" placeholder="assets/other.jpg 또는 https://..." />
          </div>

          <div class="field full">
            <label for="myAvatar">내 프로필 이미지 URL 또는 파일 경로</label>
            <input id="myAvatar" type="text" placeholder="assets/me.jpg 또는 https://..." />
          </div>

          <div class="field full">
            <label for="rawChat">BAND txt 내용 붙여넣기</label>
            <textarea id="rawChat" placeholder="예시)
2026년 2월 2일 오후 7:27:대화A:Knock Knock!
2026년 2월 2일 오후 7:29:대화B:노크는 갑자기 왜."></textarea>
          </div>
        </div>

        <div class="actions">
          <label class="file-label" for="txtFile">txt 파일 불러오기</label>
          <input id="txtFile" type="file" accept=".txt,text/plain" />
          <button id="renderBtn" type="button">미리보기 갱신</button>
          <button id="resetBtn" type="button" class="danger">전체 초기화</button>
        </div>

        <div class="status" id="statusBox">
          아직 미리보기에 적용된 채팅 없음
        </div>
      </div>
    </aside>

    <section class="preview-wrap">
      <div class="preview-toolbar">
        <button id="toggleEditorBtn" type="button" class="secondary">편집 패널 숨기기</button>
      </div>

      <div class="chat-app">
        <header class="chat-header">
          <div class="header-icon" aria-hidden="true">↩</div>
          <div class="header-center">
            <div class="header-title" id="headerTitle">채팅방</div>
            <div class="header-subtitle" id="headerSubtitle"></div>
          </div>
          <div class="header-icon" aria-hidden="true">⋮</div>
        </header>

        <div class="participant-bar">
          <div class="person-chip other">
            <div class="avatar" id="otherChipAvatar"></div>
            <div class="person-meta">
              <div class="person-role">other</div>
              <div class="person-name" id="otherChipName">상대</div>
            </div>
          </div>

          <div class="person-chip me">
            <div class="person-meta">
              <div class="person-role">me</div>
              <div class="person-name" id="myChipName">나</div>
            </div>
            <div class="avatar" id="myChipAvatar"></div>
          </div>
        </div>

        <main class="messages" id="messagesArea">
          <div class="empty-state">
            txt 파일을 올리거나 붙여넣은 뒤<br />
            <strong>미리보기 갱신</strong>을 누르면 여기서 채팅 UI로 보입니다.
          </div>
        </main>

        <div class="input-mock" aria-hidden="true">
          <div class="mock-icon">☺</div>
          <div class="mock-icon">🖼</div>
          <div class="mock-icon">GIF</div>
          <div class="mock-icon">📎</div>
          <div class="input-hint">보낼 메시지를 입력하세요.</div>
          <div class="send-mock">보내기</div>
        </div>
      </div>
    </section>
  </div>

  <script>
  const ENABLE_LOCAL_SAVE = true;

  const DEFAULT_EDITOR_HIDDEN = window.matchMedia("(max-width: 980px)").matches;

  const STORAGE_KEY = "band-chat-backup-workspace-v6";

  const INITIAL_FORM_VALUES = {
    roomTitle: "",
    roomSubtitle: "",
    otherDisplayName: "",
    myDisplayName: "",
    otherAvatar: "",
    myAvatar: "",
    otherSourceName: "",
    mySourceName: ""
  };

  const INITIAL_RAW_CHAT = ``;

  // 안드로이드: 2026년 2월 2일 오후 7:27:지옥파파:내용
  const ANDROID_CHAT_LINE_RE = /^((?:\d{4}년\s+\d{1,2}월\s+\d{1,2}일\s+(?:오전|오후)\s+\d{1,2}:\d{2}))\:([^:]+)\:(.*)$/;

  // 아이폰: 2026년 1월 13일 오후 12:51 OFF 꺼져.
  const IOS_CHAT_LINE_RE = /^((?:\d{4}년\s+\d{1,2}월\s+\d{1,2}일\s+(?:오전|오후)\s+\d{1,2}:\d{2}))\s+(.+)$/;

  const DATE_RE = /^(\d{4})년\s+(\d{1,2})월\s+(\d{1,2})일\s+(오전|오후)\s+(\d{1,2}):(\d{2})$/;

  const $ = (id) => document.getElementById(id);

  const els = {
    pageRoot: $("pageRoot"),
    editorPanel: $("editorPanel"),
    toggleEditorBtn: $("toggleEditorBtn"),

    roomTitle: $("roomTitle"),
    roomSubtitle: $("roomSubtitle"),
    otherDisplayName: $("otherDisplayName"),
    myDisplayName: $("myDisplayName"),
    otherSourceName: $("otherSourceName"),
    mySourceName: $("mySourceName"),
    otherAvatar: $("otherAvatar"),
    myAvatar: $("myAvatar"),
    rawChat: $("rawChat"),

    txtFile: $("txtFile"),
    renderBtn: $("renderBtn"),
    resetBtn: $("resetBtn"),
    statusBox: $("statusBox"),

    headerTitle: $("headerTitle"),
    headerSubtitle: $("headerSubtitle"),
    otherChipName: $("otherChipName"),
    myChipName: $("myChipName"),
    otherChipAvatar: $("otherChipAvatar"),
    myChipAvatar: $("myChipAvatar"),
    messagesArea: $("messagesArea")
  };

  let workspace = createWorkspace();

  function createEmptySettings() {
    return {
      roomTitle: "",
      roomSubtitle: "",
      otherDisplayName: "",
      myDisplayName: "",
      otherAvatar: "",
      myAvatar: "",
      otherSourceName: "",
      mySourceName: ""
    };
  }

  function createEmptySnapshot() {
    return {
      settings: createEmptySettings(),
      rawChat: ""
    };
  }

  function createWorkspace() {
    return {
      draft: createEmptySnapshot(),
      applied: createEmptySnapshot(),
      ui: {
        editorHidden: DEFAULT_EDITOR_HIDDEN
      }
    };
  }

  function cloneSnapshot(snapshot) {
    const settings = snapshot?.settings || {};

    return {
      settings: {
        roomTitle: settings.roomTitle || "",
        roomSubtitle: settings.roomSubtitle || "",
        otherDisplayName: settings.otherDisplayName || "",
        myDisplayName: settings.myDisplayName || "",
        otherAvatar: settings.otherAvatar || "",
        myAvatar: settings.myAvatar || "",
        otherSourceName: settings.otherSourceName || "",
        mySourceName: settings.mySourceName || ""
      },
      rawChat: snapshot?.rawChat || ""
    };
  }

  function normalizeText(raw) {
    return (raw || "")
      .replace(/^\uFEFF/, "")
      .replace(/\r\n?/g, "\n")
      .replace(/\u00A0/g, " ")
      .trim();
  }

  function parseTimestamp(fullTimestamp) {
    const match = fullTimestamp.match(DATE_RE);

    if (!match) {
      return {
        dateLabel: fullTimestamp,
        timeLabel: "",
        dateKey: fullTimestamp
      };
    }

    const [, year, month, day, ampm, hour, minute] = match;

    return {
      dateLabel: `${Number(year)}년 ${Number(month)}월 ${Number(day)}일`,
      timeLabel: `${ampm} ${Number(hour)}:${minute}`,
      dateKey: `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`
    };
  }

  function uniqueNonEmpty(values) {
    return [...new Set(values.map((v) => (v || "").trim()).filter(Boolean))];
  }

  function parseIOSRest(rest, knownSenders = []) {
    const cleanRest = (rest || "").trim();
    if (!cleanRest) return null;

    const sortedKnownSenders = uniqueNonEmpty(knownSenders).sort((a, b) => b.length - a.length);

    // 이미 알고 있는 이름이 있으면 그 이름부터 우선 매칭
    for (const sender of sortedKnownSenders) {
      if (cleanRest === sender) {
        return { sender, text: "" };
      }

      if (cleanRest.startsWith(sender + " ")) {
        return {
          sender,
          text: cleanRest.slice(sender.length).trimStart()
        };
      }
    }

    // 이름을 아직 모를 때는 첫 공백 전까지를 발신자로 가정
    const firstSpaceIndex = cleanRest.indexOf(" ");
    if (firstSpaceIndex === -1) {
      return {
        sender: cleanRest,
        text: ""
      };
    }

    return {
      sender: cleanRest.slice(0, firstSpaceIndex).trim(),
      text: cleanRest.slice(firstSpaceIndex + 1)
    };
  }

  function parseChat(raw, knownSenders = []) {
    const normalized = normalizeText(raw);
    if (!normalized) return [];

    const lines = normalized.split("\n");
    const messages = [];

    for (const rawLine of lines) {
      const line = rawLine.trimEnd();
      if (!line.trim()) continue;

      let fullTimestamp = "";
      let sender = "";
      let text = "";

      const androidMatch = line.match(ANDROID_CHAT_LINE_RE);

      if (androidMatch) {
        fullTimestamp = androidMatch[1].trim();
        sender = androidMatch[2].trim();
        text = androidMatch[3] || "";
      } else {
        const iosMatch = line.match(IOS_CHAT_LINE_RE);

        if (iosMatch) {
          fullTimestamp = iosMatch[1].trim();

          const parsedIOS = parseIOSRest(iosMatch[2] || "", knownSenders);

          if (!parsedIOS) {
            if (messages.length > 0) {
              messages[messages.length - 1].text += `\n${line}`;
            }
            continue;
          }

          sender = parsedIOS.sender;
          text = parsedIOS.text;
        } else {
          // 줄바꿈 포함 메시지는 이전 메시지에 이어 붙임
          if (messages.length > 0) {
            messages[messages.length - 1].text += `\n${line}`;
          }
          continue;
        }
      }

      const timeInfo = parseTimestamp(fullTimestamp);

      messages.push({
        fullTimestamp,
        sender,
        text,
        dateLabel: timeInfo.dateLabel,
        timeLabel: timeInfo.timeLabel,
        dateKey: timeInfo.dateKey
      });
    }

    return messages;
  }

  function getUniqueSenders(messages) {
    return [...new Set(messages.map((msg) => msg.sender))];
  }

  function populateSingleSelect(select, senders, placeholderText, selectedValue) {
    select.innerHTML = "";

    const placeholder = document.createElement("option");
    placeholder.value = "";
    placeholder.textContent = placeholderText;
    select.append(placeholder);

    senders.forEach((sender) => {
      const option = document.createElement("option");
      option.value = sender;
      option.textContent = sender;
      select.append(option);
    });

    if (selectedValue && senders.includes(selectedValue)) {
      select.value = selectedValue;
    } else {
      select.value = "";
    }
  }

  function syncSenderSelectsFromRaw(raw, preferredOther = "", preferredMe = "") {
    // 1차: 기존 선택값을 힌트로 먼저 파싱
    let messages = parseChat(raw, [preferredOther, preferredMe]);
    let senders = getUniqueSenders(messages);

    // 2차: 감지된 이름까지 힌트로 넣고 다시 파싱
    messages = parseChat(raw, [preferredOther, preferredMe, ...senders]);
    senders = getUniqueSenders(messages);

    populateSingleSelect(els.otherSourceName, senders, "상대 이름 선택", preferredOther);
    populateSingleSelect(els.mySourceName, senders, "내 이름 선택", preferredMe);

    let otherValue = els.otherSourceName.value;
    let myValue = els.mySourceName.value;

    if (!otherValue && senders[0]) {
      otherValue = senders[0];
    }

    if (!myValue) {
      myValue = senders.find((name) => name !== otherValue) || senders[0] || "";
    }

    if (otherValue && myValue && otherValue === myValue && senders.length > 1) {
      myValue = senders.find((name) => name !== otherValue) || myValue;
    }

    els.otherSourceName.value = otherValue || "";
    els.mySourceName.value = myValue || "";

    return { messages, senders };
  }

  function createAvatarNode(name, src, sizeClass = "avatar") {
    const wrapper = document.createElement("div");
    wrapper.className = sizeClass;

    const cleanName = (name || "?").trim();
    const fallbackText = cleanName ? cleanName[0].toUpperCase() : "?";

    if (src) {
      const img = document.createElement("img");
      img.alt = cleanName || "avatar";
      img.src = src;
      img.onerror = () => {
        wrapper.innerHTML = "";
        wrapper.textContent = fallbackText;
      };
      wrapper.append(img);
    } else {
      wrapper.textContent = fallbackText;
    }

    return wrapper;
  }

  function paintChip(container, name, avatar) {
    container.innerHTML = "";
    container.append(createAvatarNode(name, avatar, "avatar"));
  }

  function getCurrentFormSnapshot() {
    return {
      settings: {
        roomTitle: els.roomTitle.value.trim(),
        roomSubtitle: els.roomSubtitle.value.trim(),
        otherDisplayName: els.otherDisplayName.value.trim(),
        myDisplayName: els.myDisplayName.value.trim(),
        otherAvatar: els.otherAvatar.value.trim(),
        myAvatar: els.myAvatar.value.trim(),
        otherSourceName: els.otherSourceName.value,
        mySourceName: els.mySourceName.value
      },
      rawChat: els.rawChat.value
    };
  }

  function fillFormFromSnapshot(snapshot) {
    const safe = snapshot || createEmptySnapshot();
    const settings = safe.settings || createEmptySettings();

    els.roomTitle.value = settings.roomTitle || "";
    els.roomSubtitle.value = settings.roomSubtitle || "";
    els.otherDisplayName.value = settings.otherDisplayName || "";
    els.myDisplayName.value = settings.myDisplayName || "";
    els.otherAvatar.value = settings.otherAvatar || "";
    els.myAvatar.value = settings.myAvatar || "";
    els.rawChat.value = safe.rawChat || "";

    syncSenderSelectsFromRaw(
      els.rawChat.value,
      settings.otherSourceName || "",
      settings.mySourceName || ""
    );
  }

  function renderHeader(snapshot) {
    const settings = snapshot.settings || createEmptySettings();

    const roomTitle = settings.roomTitle || "채팅방";
    const roomSubtitle = settings.roomSubtitle || "";
    const otherName = settings.otherDisplayName || settings.otherSourceName || "상대";
    const myName = settings.myDisplayName || settings.mySourceName || "나";

    els.headerTitle.textContent = roomTitle;
    els.headerSubtitle.textContent = roomSubtitle;
    els.otherChipName.textContent = otherName;
    els.myChipName.textContent = myName;

    paintChip(els.otherChipAvatar, otherName, settings.otherAvatar || "");
    paintChip(els.myChipAvatar, myName, settings.myAvatar || "");
  }

  function renderMessages(snapshot) {
    const settings = snapshot.settings || createEmptySettings();
    const messages = parseChat(snapshot.rawChat || "", [
      settings.otherSourceName,
      settings.mySourceName
    ]);

    els.messagesArea.innerHTML = "";

    if (!messages.length) {
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.innerHTML = `
        txt 파일을 올리거나 붙여넣은 뒤<br />
        <strong>미리보기 갱신</strong>을 누르면 여기서 채팅 UI로 보입니다.
      `;
      els.messagesArea.append(empty);
      return;
    }

    const otherSource = settings.otherSourceName || "";
    const mySource = settings.mySourceName || "";

    messages.forEach((msg, index) => {
      const previous = messages[index - 1];
      const dateChanged = !previous || previous.dateKey !== msg.dateKey;

      if (dateChanged) {
        const divider = document.createElement("div");
        divider.className = "date-divider";
        divider.textContent = msg.dateLabel;
        els.messagesArea.append(divider);
      }

      let side = "other";

      if (mySource && msg.sender === mySource) {
        side = "me";
      } else if (otherSource && msg.sender === otherSource) {
        side = "other";
      }

      const grouped = previous && previous.sender === msg.sender && previous.dateKey === msg.dateKey;

      const row = document.createElement("div");
      row.className = `message-row ${side}`;

      if (side === "other") {
        const avatarSlot = document.createElement("div");
        avatarSlot.className = `avatar-slot ${grouped ? "placeholder" : ""}`.trim();

        if (!grouped) {
          avatarSlot.append(
            createAvatarNode(
              settings.otherDisplayName || msg.sender,
              settings.otherAvatar || "",
              "mini-avatar"
            )
          );
        }

        row.append(avatarSlot);
      }

      const main = document.createElement("div");
      main.className = "message-main";

      if (side === "other" && !grouped) {
        const sender = document.createElement("div");
        sender.className = "sender-name";
        sender.textContent = settings.otherDisplayName || msg.sender;
        main.append(sender);
      }

      const bubbleLine = document.createElement("div");
      bubbleLine.className = "bubble-line";

      if (side === "me") {
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = msg.timeLabel;
        bubbleLine.append(meta);
      }

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = msg.text;
      bubbleLine.append(bubble);

      if (side === "other") {
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = msg.timeLabel;
        bubbleLine.append(meta);
      }

      main.append(bubbleLine);
      row.append(main);
      els.messagesArea.append(row);
    });

    requestAnimationFrame(() => {
      els.messagesArea.scrollTop = els.messagesArea.scrollHeight;
    });
  }

  function renderAppliedSnapshot() {
    renderHeader(workspace.applied);
    renderMessages(workspace.applied);
  }

  function setStatus(message, type = "default") {
    els.statusBox.textContent = message;
    els.statusBox.classList.remove("error", "success");

    if (type === "error") {
      els.statusBox.classList.add("error");
    } else if (type === "success") {
      els.statusBox.classList.add("success");
    }
  }

  function saveWorkspace() {
    if (!ENABLE_LOCAL_SAVE) return;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(workspace));
  }

  function loadWorkspace() {
    if (!ENABLE_LOCAL_SAVE) return null;

    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
      return saved;
    } catch (error) {
      console.warn("저장된 작업 상태를 불러오지 못했습니다.", error);
      return null;
    }
  }

  function applyInitialFormValues() {
    fillFormFromSnapshot({
      settings: {
        roomTitle: INITIAL_FORM_VALUES.roomTitle || "",
        roomSubtitle: INITIAL_FORM_VALUES.roomSubtitle || "",
        otherDisplayName: INITIAL_FORM_VALUES.otherDisplayName || "",
        myDisplayName: INITIAL_FORM_VALUES.myDisplayName || "",
        otherAvatar: INITIAL_FORM_VALUES.otherAvatar || "",
        myAvatar: INITIAL_FORM_VALUES.myAvatar || "",
        otherSourceName: INITIAL_FORM_VALUES.otherSourceName || "",
        mySourceName: INITIAL_FORM_VALUES.mySourceName || ""
      },
      rawChat: INITIAL_RAW_CHAT || ""
    });
  }

  function setEditorHidden(hidden, shouldSave = true) {
    workspace.ui.editorHidden = !!hidden;

    els.editorPanel.classList.toggle("hidden", hidden);
    els.pageRoot.classList.toggle("editor-collapsed", hidden);
    els.toggleEditorBtn.textContent = hidden ? "편집 패널 열기" : "편집 패널 숨기기";

    if (shouldSave) {
      saveWorkspace();
    }
  }

  function persistDraftFromForm() {
    workspace.draft = cloneSnapshot(getCurrentFormSnapshot());
    saveWorkspace();
  }

  function handleDraftInput() {
    syncSenderSelectsFromRaw(
      els.rawChat.value,
      els.otherSourceName.value,
      els.mySourceName.value
    );
    persistDraftFromForm();
  }

  function applyDraftToPreview() {
    syncSenderSelectsFromRaw(
      els.rawChat.value,
      els.otherSourceName.value,
      els.mySourceName.value
    );

    const snapshot = getCurrentFormSnapshot();
    const messages = parseChat(snapshot.rawChat, [
      snapshot.settings.otherSourceName,
      snapshot.settings.mySourceName
    ]);
    const senders = getUniqueSenders(messages);

    workspace.draft = cloneSnapshot(snapshot);
    workspace.applied = cloneSnapshot(snapshot);
    saveWorkspace();

    renderAppliedSnapshot();

    if (!snapshot.rawChat.trim()) {
      setStatus("채팅 내용이 비어 있음 - txt 파일을 불러오거나 붙여넣기 요망");
      return;
    }

    if (!messages.length) {
      setStatus("메시지 형식을 읽지 못 함 - BAND 내보내기 txt 형식인지 확인 요망", "error");
      return;
    }

    const senderSummary = senders.length ? ` / 감지된 이름: ${senders.join(", ")}` : "";
    setStatus(`${messages.length}개의 메시지${senderSummary}`, "success");
  }

  function handleFileLoad(file) {
    if (!file) return;

    const reader = new FileReader();

    reader.onload = () => {
      els.rawChat.value = typeof reader.result === "string" ? reader.result : "";
      syncSenderSelectsFromRaw(
        els.rawChat.value,
        els.otherSourceName.value,
        els.mySourceName.value
      );
      persistDraftFromForm();
      setStatus("txt 파일 확인 - 미리보기 갱신을 눌러 적용 요망");
    };

    reader.onerror = () => {
      setStatus("파일을 읽는 중 문제 발생 - 서식 확인 요망", "error");
    };

    reader.readAsText(file);
  }

  function resetAll() {
    const ok = window.confirm("편집 중인 내용, 적용된 미리보기, 저장된 기록을 모두 초기화할까요?");
    if (!ok) return;

    workspace = createWorkspace();

    if (ENABLE_LOCAL_SAVE) {
      localStorage.removeItem(STORAGE_KEY);
    }

    applyInitialFormValues();
    setEditorHidden(DEFAULT_EDITOR_HIDDEN, false);
    renderAppliedSnapshot();
    setStatus("전체 초기화를 완료했습니다.");
  }

  function init() {
    const saved = loadWorkspace();

    if (saved && typeof saved === "object") {
      workspace = {
        draft: saved.draft ? cloneSnapshot(saved.draft) : createEmptySnapshot(),
        applied: saved.applied ? cloneSnapshot(saved.applied) : createEmptySnapshot(),
        ui: {
          editorHidden:
            saved.ui && typeof saved.ui.editorHidden === "boolean"
              ? saved.ui.editorHidden
              : DEFAULT_EDITOR_HIDDEN
        }
      };

      fillFormFromSnapshot(workspace.draft);
      setEditorHidden(workspace.ui.editorHidden, false);
      renderAppliedSnapshot();

      const appliedMessages = parseChat(workspace.applied.rawChat, [
        workspace.applied.settings.otherSourceName,
        workspace.applied.settings.mySourceName
      ]);

      if (workspace.applied.rawChat.trim() && appliedMessages.length) {
        setStatus(`${appliedMessages.length}개의 메시지가 마지막 적용 상태로 복원`);
      } else {
        setStatus("이전 저장된 편집 내용은 유지, 아직 적용된 미리보기는 없음");
      }
    } else {
      workspace = createWorkspace();
      applyInitialFormValues();
      setEditorHidden(DEFAULT_EDITOR_HIDDEN, false);
      renderAppliedSnapshot();
      setStatus("미리보기에 적용된 채팅 없음");
    }
  }

  els.renderBtn.addEventListener("click", applyDraftToPreview);
  els.resetBtn.addEventListener("click", resetAll);

  els.toggleEditorBtn.addEventListener("click", () => {
    const nextHidden = !workspace.ui.editorHidden;
    setEditorHidden(nextHidden, true);
  });

  els.txtFile.addEventListener("change", (event) => {
    const [file] = event.target.files || [];
    handleFileLoad(file);
    event.target.value = "";
  });

  [
    els.roomTitle,
    els.roomSubtitle,
    els.otherDisplayName,
    els.myDisplayName,
    els.otherAvatar,
    els.myAvatar,
    els.rawChat
  ].forEach((element) => {
    element.addEventListener("input", handleDraftInput);
  });

  [els.otherSourceName, els.mySourceName].forEach((element) => {
    element.addEventListener("change", persistDraftFromForm);
  });

  init();
</script>
</body>
</html>
